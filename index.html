<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#020509">
  <link rel="manifest" href="manifest.json">
  <title>HELLPAD</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    :root{
      --bg:#020509; --panel:#060d18; --panel2:#0a1828;
      --border:#1a5a7a; --glow:#00c8f0; --glow2:#0090c0;
      --text:#a0d8f0; --text-bright:#d0f0ff; --text-dim:#2a6080;
      --btn-bg:#040c18; --success:#f0a040; --success2:#e06820; --danger:#d03040;
    }
    html,body{height:100%;width:100%;background:var(--bg);color:var(--text);
      font-family:'Courier New',Courier,monospace;overflow:hidden;
      user-select:none;-webkit-user-select:none;}
    body::after{content:'';position:fixed;inset:0;
      background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.07) 3px,rgba(0,0,0,.07) 4px);
      pointer-events:none;z-index:9999;}

    #app{display:flex;flex-direction:column;height:100%;height:100dvh;max-width:480px;margin:0 auto;}

    /* ── HEADER ── */
    #hdr{display:flex;align-items:center;justify-content:space-between;
      padding:6px 12px;border-bottom:1px solid var(--border);
      background:var(--panel);flex-shrink:0;}
    #hdr-title{font-size:20px;font-weight:bold;letter-spacing:5px;color:var(--glow);
      text-shadow:0 0 8px var(--glow),0 0 20px var(--glow2);}
    #hdr-sub{font-size:8px;letter-spacing:2px;color:var(--text-dim);margin-top:1px;}
    #hdr-btns{display:flex;gap:6px;}
    .hbtn{background:var(--btn-bg);border:1px solid var(--border);color:var(--text);
      padding:5px 9px;border-radius:3px;cursor:pointer;font-family:inherit;
      font-size:11px;letter-spacing:1px;transition:all .15s;}
    .hbtn:active,.hbtn.active{border-color:var(--glow);color:var(--glow);background:rgba(0,200,240,.1);}

    /* ── SEQUENCE ── */
    #seq-section{padding:7px 12px;border-bottom:1px solid var(--border);
      background:var(--panel);flex-shrink:0;}
    #seq-label{font-size:8px;letter-spacing:3px;color:var(--text-dim);margin-bottom:4px;}
    #seq-display{display:flex;align-items:center;gap:3px;flex-wrap:wrap;
      min-height:34px;padding:4px 7px;background:var(--bg);
      border:1px solid var(--border);border-radius:3px;}
    .seq-arrow{display:inline-flex;align-items:center;justify-content:center;
      width:26px;height:26px;background:var(--panel2);border:1px solid var(--border);
      border-radius:3px;font-size:14px;color:var(--glow);
      text-shadow:0 0 6px var(--glow);flex-shrink:0;animation:ain .1s ease;}
    @keyframes ain{from{transform:scale(.4);opacity:0}to{transform:scale(1);opacity:1}}
    .seq-cursor{width:2px;height:20px;background:var(--glow);border-radius:1px;animation:blink 1s step-end infinite;}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
    #seq-empty{color:var(--text-dim);font-size:10px;letter-spacing:2px;}

    /* ── MATCH STATUS ── */
    #match-section{padding:6px 12px;border-bottom:1px solid var(--border);
      flex-shrink:0;min-height:50px;display:flex;align-items:center;
      background:var(--panel);transition:background .3s;}
    #match-section.matched{background:#160800;}
    #match-empty{color:var(--text-dim);font-size:9px;letter-spacing:3px;width:100%;text-align:center;}
    #match-content{display:none;width:100%;align-items:center;gap:10px;}
    #match-content.show{display:flex;}
    #match-icon-wrap{width:36px;height:36px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
    #match-icon-img{width:36px;height:36px;object-fit:contain;display:none;}
    #match-icon-emoji{font-size:26px;}
    #match-info{flex:1;min-width:0;}
    #match-name{font-size:14px;font-weight:bold;color:var(--success);
      text-shadow:0 0 10px var(--success2);letter-spacing:1px;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    #match-cat{font-size:9px;letter-spacing:3px;color:var(--text-dim);margin-top:2px;}
    #match-status{font-size:9px;letter-spacing:2px;color:var(--success);flex-shrink:0;}

    /* ── LIST SECTION (hidden by default) ── */
    #list-section{display:none;flex-direction:column;flex:1;overflow:hidden;min-height:0;}
    #app.list-open #list-section{display:flex;}
    #list-hdr{display:flex;align-items:center;justify-content:space-between;
      padding:4px 12px;position:sticky;top:0;background:var(--panel);
      border-bottom:1px solid var(--border);flex-shrink:0;}
    #list-title{font-size:8px;letter-spacing:3px;color:var(--text-dim);}
    #list-count{font-size:9px;color:var(--glow);}
    #stratagem-list{flex:1;overflow-y:auto;overflow-x:hidden;}
    #stratagem-list::-webkit-scrollbar{width:3px;}
    #stratagem-list::-webkit-scrollbar-track{background:var(--bg);}
    #stratagem-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
    .si{display:flex;align-items:center;padding:6px 12px;
      border-bottom:1px solid #081422;cursor:pointer;transition:background .1s;gap:8px;}
    .si:active,.si:hover{background:var(--panel2);}
    .si.exact{background:#160800;}
    .si-img{width:22px;height:22px;object-fit:contain;flex-shrink:0;opacity:.85;}
    .si-code{font-size:10px;color:var(--glow);letter-spacing:1px;flex-shrink:0;
      width:110px;text-shadow:0 0 4px rgba(0,200,240,.3);}
    .si-code .mp{color:var(--success);}
    .si-name{flex:1;font-size:12px;color:var(--text-bright);
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .si-cat{font-size:7px;letter-spacing:1px;padding:2px 4px;border-radius:2px;flex-shrink:0;}

    /* ── DPAD SECTION ── */
    #dpad-section{flex-shrink:0;display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      padding:10px 12px 8px;background:var(--panel);border-top:1px solid var(--border);}
    /* Expand to fill when list is closed */
    #app:not(.list-open) #dpad-section{flex:1;}

    /* Blue dpad container */
    #dpad-bg{
      background:radial-gradient(ellipse at 46% 38%, #2462d4 0%, #0c3490 42%, #040e40 100%);
      border-radius:18px;padding:10px;
      box-shadow:0 0 50px rgba(16,70,220,.55),inset 0 0 40px rgba(0,0,80,.45),0 8px 32px rgba(0,0,0,.7);}
    /* Size: large when list closed, smaller when open */
    #app:not(.list-open) #dpad-bg{width:min(300px,82vw);}
    #app.list-open #dpad-bg{width:min(216px,72vw);}

    /* 3×3 grid */
    #dpad-grid{display:grid;grid-template-columns:repeat(3,1fr);
      grid-template-rows:repeat(3,1fr);gap:5px;
      width:100%;aspect-ratio:1;}

    /* Arrow buttons */
    .db{display:flex;align-items:center;justify-content:center;
      background:transparent;border:none;cursor:pointer;
      padding:0;touch-action:manipulation;border-radius:6px;}
    .db .asv{transition:transform .12s;}
    .db .ap{fill:white;filter:drop-shadow(1px 4px 6px rgba(0,0,50,.85));transition:fill .1s,filter .1s;}
    .db.press .asv{transform:scale(.9) rotate(var(--rot,0deg));}
    .db.press .ap{fill:#5ad0ff;filter:drop-shadow(0 0 10px rgba(90,208,255,.95)) drop-shadow(1px 4px 6px rgba(0,0,50,.8));}

    /* Center piece */
    #dpad-center{display:flex;align-items:center;justify-content:center;
      background:rgba(0,0,30,.5);border-radius:6px;}
    #dpad-center-dot{width:8px;height:8px;background:#1a3a70;border-radius:50%;
      box-shadow:0 0 6px rgba(0,100,200,.4);}
    .dpad-corner{visibility:hidden;}

    /* Action row */
    #act-row{display:flex;gap:8px;justify-content:center;
      width:min(300px,82vw);margin-top:8px;}
    #app.list-open #act-row{width:min(216px,72vw);}
    .ab{flex:1;padding:9px 0;background:var(--btn-bg);
      border:1px solid var(--border);border-radius:5px;color:var(--text);
      font-family:inherit;font-size:10px;letter-spacing:2px;
      cursor:pointer;text-align:center;transition:all .1s;}
    .ab:active{background:rgba(0,200,240,.08);border-color:var(--glow);color:var(--glow);}
    .ab.dng:active{background:rgba(208,48,64,.08);border-color:var(--danger);color:var(--danger);}

    /* ── FLASH OVERLAY ── */
    #flash{position:fixed;inset:0;z-index:10000;
      background:rgba(2,5,9,.94);display:flex;flex-direction:column;
      align-items:center;justify-content:center;gap:14px;
      opacity:0;pointer-events:none;transition:opacity .2s;}
    #flash.show{opacity:1;pointer-events:auto;}
    #flash-img-wrap{width:90px;height:90px;display:flex;align-items:center;justify-content:center;}
    #flash-img{width:90px;height:90px;object-fit:contain;display:none;}
    #flash-emoji{font-size:64px;}
    #flash-name{font-size:22px;font-weight:bold;letter-spacing:3px;
      text-align:center;padding:0 20px;text-shadow:0 0 20px var(--success2);}
    #flash-code{font-size:20px;color:var(--glow);letter-spacing:6px;text-shadow:0 0 12px var(--glow);}
    #flash-label{font-size:10px;letter-spacing:6px;color:var(--text-dim);}

    /* fullscreen */
    :fullscreen #app,:-webkit-full-screen #app{max-width:none;}
  </style>
</head>
<body>

<!-- FLASH OVERLAY -->
<div id="flash">
  <div id="flash-img-wrap">
    <img id="flash-img" src="" alt="">
    <span id="flash-emoji">★</span>
  </div>
  <div id="flash-name">REINFORCE</div>
  <div id="flash-code">↑ ↓ → ← ↑</div>
  <div id="flash-label">STRATAGEM INBOUND</div>
</div>

<div id="app">

  <!-- HEADER -->
  <div id="hdr">
    <div>
      <div id="hdr-title">🦅 HELLPAD</div>
      <div id="hdr-sub">STRATAGEM INPUT SYSTEM</div>
    </div>
    <div id="hdr-btns">
      <button class="hbtn" id="list-btn" onclick="toggleList()">≡ LIST</button>
      <button class="hbtn" id="fs-btn" onclick="toggleFS()">⛶ FULL</button>
    </div>
  </div>

  <!-- SEQUENCE -->
  <div id="seq-section">
    <div id="seq-label">ACTIVE CODE SEQUENCE</div>
    <div id="seq-display">
      <span id="seq-empty">ENTER DIRECTIONAL CODE...</span>
    </div>
  </div>

  <!-- MATCH STATUS -->
  <div id="match-section">
    <span id="match-empty">— AWAITING INPUT —</span>
    <div id="match-content">
      <div id="match-icon-wrap">
        <img id="match-icon-img" src="" alt="" onerror="this.style.display='none';document.getElementById('match-icon-emoji').style.display=''">
        <span id="match-icon-emoji">★</span>
      </div>
      <div id="match-info">
        <div id="match-name">REINFORCE</div>
        <div id="match-cat">MISSION</div>
      </div>
      <div id="match-status">★ CALLED ★</div>
    </div>
  </div>

  <!-- STRATAGEM LIST (hidden by default) -->
  <div id="list-section">
    <div id="list-hdr">
      <span id="list-title">STRATAGEM DATABASE</span>
      <span id="list-count"></span>
    </div>
    <div id="stratagem-list"></div>
  </div>

  <!-- DPAD -->
  <div id="dpad-section">
    <div id="dpad-bg">
      <div id="dpad-grid">
        <!-- Row 1 -->
        <div class="dpad-corner"></div>
        <button class="db" data-dir="U" style="--rot:0deg">
          <svg class="asv" viewBox="0 0 100 100" style="width:75%;height:75%">
            <polygon class="ap" points="50,4 96,52 68,52 68,96 32,96 32,52 4,52"/>
          </svg>
        </button>
        <div class="dpad-corner"></div>
        <!-- Row 2 -->
        <button class="db" data-dir="L" style="--rot:-90deg">
          <svg class="asv" viewBox="0 0 100 100" style="width:75%;height:75%;transform:rotate(-90deg)">
            <polygon class="ap" points="50,4 96,52 68,52 68,96 32,96 32,52 4,52"/>
          </svg>
        </button>
        <div id="dpad-center"><div id="dpad-center-dot"></div></div>
        <button class="db" data-dir="R" style="--rot:90deg">
          <svg class="asv" viewBox="0 0 100 100" style="width:75%;height:75%;transform:rotate(90deg)">
            <polygon class="ap" points="50,4 96,52 68,52 68,96 32,96 32,52 4,52"/>
          </svg>
        </button>
        <!-- Row 3 -->
        <div class="dpad-corner"></div>
        <button class="db" data-dir="D" style="--rot:180deg">
          <svg class="asv" viewBox="0 0 100 100" style="width:75%;height:75%;transform:rotate(180deg)">
            <polygon class="ap" points="50,4 96,52 68,52 68,96 32,96 32,52 4,52"/>
          </svg>
        </button>
        <div class="dpad-corner"></div>
      </div>
    </div>
    <div id="act-row">
      <button class="ab" id="bksp-btn">⌫ BACK</button>
      <button class="ab dng" id="clr-btn">✗ CLEAR</button>
    </div>
  </div>

</div>

  const p=ICONS[name];
  if(!p) return null;
  return CDN+p.split('/').map(s=>encodeURIComponent(s)).join('/');

  {n:"B-1 Supply Pack",             c:"Backpack",k:["D","L","D","U","U","D"]},
  {n:"SH-20 Ballistic Shield",      c:"Backpack",k:["D","L","D","D","U","L"]},
  {n:"SH-32 Shield Generator Pack", c:"Backpack",k:["D","U","L","R","L","R"]},
  {n:"AX/AR-23 Guard Dog",          c:"Backpack",k:["D","U","L","U","R","D"]},
  {n:"AX/LAS-5 Guard Dog Rover",    c:"Backpack",k:["D","U","L","U","R","R"]},
  {n:"SH-51 Directional Shield",    c:"Backpack",k:["D","U","L","R","U","U"]},
  {n:"HMG Emplacement",         c:"Emplacement",k:["D","U","L","R","R","L"]},
  {n:"Shield Generator Relay",  c:"Emplacement",k:["D","D","L","R","L","R"]},
  {n:"A/ARC-3 Tesla Tower",     c:"Emplacement",k:["D","U","R","U","L","R"]},
  {n:"Anti-Tank Emplacement",   c:"Emplacement",k:["D","U","L","R","R","R"]},
  {n:"MD-6 Anti-Personnel Mines",c:"Mines",k:["D","L","U","R"]},
  {n:"MD-14 Incendiary Mines",   c:"Mines",k:["D","L","L","D"]},
  {n:"MD-I4 Anti-Tank Mines",    c:"Mines",k:["D","L","U","U"]},
  {n:"Machine Gun Sentry",   c:"Sentry",k:["D","U","R","R","U"]},
  {n:"Gatling Sentry",       c:"Sentry",k:["D","U","R","L"]},
  {n:"Mortar Sentry",        c:"Sentry",k:["D","U","R","R","D"]},
  {n:"Autocannon Sentry",    c:"Sentry",k:["D","U","R","U","L","U"]},
  {n:"Rocket Sentry",        c:"Sentry",k:["D","U","R","R","L"]},
  {n:"EMS Mortar Sentry",    c:"Sentry",k:["D","U","R","D","R"]},
  {n:"Flame Sentry",         c:"Sentry",k:["D","U","R","D","U","U"]},
  {n:"EXO-45 Patriot Exosuit",    c:"Exosuit",k:["L","D","R","U","L","D","D"]},
  {n:"EXO-49 Emancipator Exosuit",c:"Exosuit",k:["L","D","R","U","L","D","U"]},
];

const CAT_COLOR={
  Mission:"#f0a040",Orbital:"#9b5de5",Eagle:"#00bbf9",
  Support:"#4cc9f0",Backpack:"#3a86ff",Emplacement:"#8338ec",
  Mines:"#ff4488",Sentry:"#06d6a0",Exosuit:"#ff9f1c",
};
const CAT_ICON={
  Mission:"🎯",Orbital:"🛸",Eagle:"🦅",
  Support:"🔫",Backpack:"🎒",Emplacement:"🏗",
  Mines:"💣",Sentry:"🤖",Exosuit:"🦾",
};
const SYM={U:"↑",D:"↓",L:"←",R:"→"};

let inp=[],resetTimer=null,ctx=null;

function audio(){if(!ctx)ctx=new(window.AudioContext||window.webkitAudioContext)();return ctx;}
function beep(f=440,d=.08,t='square',v=.12){
  try{const a=audio(),o=a.createOscillator(),g=a.createGain();
    o.connect(g);g.connect(a.destination);o.type=t;o.frequency.value=f;
    g.gain.setValueAtTime(v,a.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,a.currentTime+d);
    o.start();o.stop(a.currentTime+d);}catch(e){}
}
function beepOK(){beep(523,.1,'square',.18);setTimeout(()=>beep(659,.1,'square',.18),100);setTimeout(()=>beep(784,.22,'square',.18),200);}
function beepErr(){beep(180,.18,'sawtooth',.1);}
function vibe(p){try{navigator.vibrate&&navigator.vibrate(p);}catch(e){}}

function addDir(d){
  if(resetTimer){clearTimeout(resetTimer);resetTimer=null;}
  inp=[...inp,d];
  const exact=getExact();
  if(exact){
    beepOK();vibe([60,40,60,40,120]);
    showFlash(exact);resetTimer=setTimeout(clr,3500);
  } else {
    if(getFiltered().length===0)beepErr();else beep(400+inp.length*50,.06,'square');
    vibe(25);
  }
  render();
}
function bksp(){if(inp.length){inp.pop();beep(300,.05,'square',.1);render();}}
function clr(){
  inp=[];if(resetTimer){clearTimeout(resetTimer);resetTimer=null;}
  document.getElementById('flash').classList.remove('show');render();
}
function getFiltered(){return S.filter(s=>{for(let i=0;i<inp.length;i++)if(s.k[i]!==inp[i])return false;return true;});}
function getExact(){return S.find(s=>s.k.length===inp.length&&s.k.every((d,i)=>d===inp[i]))||null;}

function setIconEl(imgEl,emojiEl,name,catEmoji){
  const url=iconUrl(name);
  if(url){
    imgEl.src=url;imgEl.style.display='';emojiEl.style.display='none';
    imgEl.onerror=()=>{imgEl.style.display='none';emojiEl.style.display='';};
  } else {
    imgEl.style.display='none';emojiEl.style.display='';emojiEl.textContent=catEmoji||'★';
  }
}

function showFlash(s){
  const url=iconUrl(s.n);
  const fi=document.getElementById('flash-img');
  const fe=document.getElementById('flash-emoji');
  if(url){fi.src=url;fi.style.display='';fe.style.display='none';fi.onerror=()=>{fi.style.display='none';fe.style.display='';fe.textContent=CAT_ICON[s.c]||'★';};}
  else{fi.style.display='none';fe.style.display='';fe.textContent=CAT_ICON[s.c]||'★';}
  document.getElementById('flash-name').textContent=s.n.toUpperCase();
  document.getElementById('flash-name').style.color=CAT_COLOR[s.c]||'var(--success)';
  document.getElementById('flash-code').textContent=s.k.map(d=>SYM[d]).join(' ');
  const fl=document.getElementById('flash');
  fl.classList.add('show');setTimeout(()=>fl.classList.remove('show'),2200);
}

function render(){
  // sequence
  const sd=document.getElementById('seq-display');
  sd.innerHTML=inp.length===0
    ?'<span id="seq-empty">ENTER DIRECTIONAL CODE...</span><div class="seq-cursor"></div>'
    :inp.map(d=>`<span class="seq-arrow">${SYM[d]}</span>`).join('')+'<div class="seq-cursor"></div>';

  // match bar
  const ms=document.getElementById('match-section');
  const me=document.getElementById('match-empty');
  const mc=document.getElementById('match-content');
  const exact=getExact();const fil=getFiltered();
  if(exact){
    me.style.display='none';mc.classList.add('show');ms.classList.add('matched');
    setIconEl(document.getElementById('match-icon-img'),document.getElementById('match-icon-emoji'),exact.n,CAT_ICON[exact.c]);
    document.getElementById('match-name').textContent=exact.n.toUpperCase();
    document.getElementById('match-name').style.color=CAT_COLOR[exact.c]||'var(--success)';
    document.getElementById('match-cat').textContent='— '+exact.c.toUpperCase()+' —';
  } else {
    mc.classList.remove('show');ms.classList.remove('matched');me.style.display='block';
    if(inp.length===0){me.textContent='— AWAITING INPUT —';me.style.color='var(--text-dim)';}
    else if(fil.length===0){me.textContent='⚠ INVALID SEQUENCE';me.style.color='var(--danger)';}
    else{me.textContent=fil.length+' POSSIBLE MATCH'+(fil.length!==1?'ES':'');me.style.color='var(--text-dim)';}
  }

  // list
  const show=inp.length===0?S:fil;
  document.getElementById('list-count').textContent=show.length+' ENTRIES';
  document.getElementById('stratagem-list').innerHTML=show.map(s=>{
    const col=CAT_COLOR[s.c]||'#888';
    const isEx=s.k.length===inp.length&&s.k.every((d,i)=>d===inp[i]);
    const code=s.k.map((d,i)=>i<inp.length?`<span class="mp">${SYM[d]}</span>`:SYM[d]).join(' ');
    const url=iconUrl(s.n);
    const imgHtml=url?`<img class="si-img" src="${url}" alt="" onerror="this.style.display='none'">`:'';
    return `<div class="si${isEx?' exact':''}" onclick="preview('${s.n.replace(/\\/g,'\\\\').replace(/'/g,"\\'")}')">
      ${imgHtml}
      <div class="si-code">${code}</div>
      <div class="si-name">${s.n}</div>
      <div class="si-cat" style="color:${col};border:1px solid ${col}33;background:${col}18">${s.c.toUpperCase()}</div>
    </div>`;
  }).join('');
}

function preview(name){
  const s=S.find(x=>x.n===name);if(!s)return;
  if(resetTimer){clearTimeout(resetTimer);resetTimer=null;}
  inp=[...s.k];beepOK();showFlash(s);resetTimer=setTimeout(clr,3500);render();
}

function toggleList(){
  const app=document.getElementById('app');
  const open=app.classList.toggle('list-open');
  document.getElementById('list-btn').classList.toggle('active',open);
  document.getElementById('list-btn').textContent=open?'✕ LIST':'≡ LIST';
}

function toggleFS(){
  const el=document.documentElement;
  if(!document.fullscreenElement&&!document.webkitFullscreenElement){
    (el.requestFullscreen||el.webkitRequestFullscreen||el.mozRequestFullScreen).call(el);
  } else {
    (document.exitFullscreen||document.webkitExitFullscreen||document.mozCancelFullScreen).call(document);
  }
}
function updFS(){
  const fs=!!(document.fullscreenElement||document.webkitFullscreenElement);
  document.getElementById('fs-btn').textContent=fs?'⛶ EXIT':'⛶ FULL';
}
document.addEventListener('fullscreenchange',updFS);
document.addEventListener('webkitfullscreenchange',updFS);

// D-pad pointer events (handles both touch & mouse, no double-fire)
document.querySelectorAll('.db[data-dir]').forEach(btn=>{
  btn.addEventListener('pointerdown',e=>{
    e.preventDefault();
    addDir(btn.dataset.dir);
    btn.classList.add('press');
    setTimeout(()=>btn.classList.remove('press'),150);
  });
});
document.getElementById('bksp-btn').addEventListener('pointerdown',e=>{e.preventDefault();bksp();});
document.getElementById('clr-btn').addEventListener('pointerdown',e=>{e.preventDefault();clr();});

// Keyboard
document.addEventListener('keydown',e=>{
  const m={ArrowUp:'U',ArrowDown:'D',ArrowLeft:'L',ArrowRight:'R',w:'U',s:'D',a:'L',d:'R',W:'U',S:'D',A:'L',D:'R'};
  if(m[e.key]){
    e.preventDefault();addDir(m[e.key]);
    const b=document.querySelector(`.db[data-dir="${m[e.key]}"]`);
    if(b){b.classList.add('press');setTimeout(()=>b.classList.remove('press'),150);}
  } else if(e.key==='Backspace'){bksp();}
  else if(e.key==='Escape'||e.key==='Delete'){clr();}
});

document.getElementById('flash').addEventListener('click',()=>{document.getElementById('flash').classList.remove('show');});

render();
</script>
</body>
</html>
