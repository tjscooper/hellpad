<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#020509">
  <link rel="manifest" href="manifest.json">
  <title>HELLPAD</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    :root{
      --bg:#020509; --panel:#060d18; --panel2:#0a1828;
      --border:#1a5a7a; --glow:#00c8f0; --glow2:#0090c0;
      --text:#a0d8f0; --text-bright:#d0f0ff; --text-dim:#2a6080;
      --success:#f0a040; --success2:#e06820; --danger:#d03040;
    }
    html,body{
      height:100%; width:100%;
      background:var(--bg); color:var(--text);
      font-family:'Courier New',Courier,monospace;
      overflow:hidden; user-select:none; -webkit-user-select:none;
    }
    body::after{
      content:''; position:fixed; inset:0; pointer-events:none; z-index:9999;
      background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.06) 3px,rgba(0,0,0,.06) 4px);
    }

    /* ── APP SHELL ── */
    #app{
      display:flex; flex-direction:column;
      width:100vw; height:100dvh;
    }

    /* ── TOP STRIP ── */
    #strip{
      display:flex; align-items:center; gap:6px;
      height:46px; flex-shrink:0;
      padding:0 10px;
      background:var(--panel);
      border-bottom:1px solid var(--border);
    }
    #strip-arrows{
      display:flex; align-items:center; gap:2px;
      flex:1; overflow:hidden; min-width:0;
    }
    .strip-arrow{
      display:inline-flex; align-items:center; justify-content:center;
      flex-shrink:0; animation:ain .1s ease;
    }
    @keyframes ain{from{transform:scale(.3);opacity:0}to{transform:scale(1);opacity:1}}
    #strip-empty{font-size:10px;letter-spacing:2px;color:var(--text-dim);}
    #strip-status{
      font-size:10px; letter-spacing:2px; color:var(--text-dim);
      white-space:nowrap; flex-shrink:0;
    }
    #strip-status.hit{color:var(--success);}
    #strip-status.bad{color:var(--danger);}
    #strip-clr{
      background:none; border:none; color:var(--text-dim);
      font-size:20px; line-height:1; cursor:pointer; padding:4px 6px;
      flex-shrink:0; touch-action:manipulation; transition:color .1s;
      font-family:inherit;
    }
    #strip-clr:active{color:var(--danger);}

    /* ── MAIN AREA ── */
    #main{
      flex:1; display:flex; align-items:center; justify-content:center;
      position:relative; overflow:hidden;
    }

    /* ── DPAD ── */
    #dpad-bg{
      background:radial-gradient(ellipse at 46% 40%,#2462d4 0%,#0c3490 42%,#040e40 100%);
      border-radius:18px; padding:10px;
      box-shadow:0 0 50px rgba(16,70,220,.55),inset 0 0 40px rgba(0,0,80,.45),0 8px 32px rgba(0,0,0,.7);
      /* Size: fit height (landscape) or width, keep 3:2 cell ratio */
      width:  calc(min(100vw - 40px, (100dvh - 46px - 28px) * 3/2 + 20px));
      height: calc(min(100dvh - 46px - 28px, (100vw - 40px) * 2/3 + 20px));
    }
    #dpad-grid{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      grid-template-rows:repeat(2,1fr);
      gap:6px;
      width:100%; height:100%;
    }
    .dpad-sp{opacity:0;pointer-events:none;}/* invisible spacer top-left/right */

    /* Arrow buttons */
    .db{
      display:flex; align-items:center; justify-content:center;
      background:transparent; border:none; cursor:pointer;
      padding:0; touch-action:manipulation; border-radius:6px;
    }
    .db .asv{width:70%; height:70%; transition:transform .12s;}
    .db .ap{
      fill:white;
      filter:drop-shadow(1px 4px 6px rgba(0,0,50,.85));
      transition:fill .1s,filter .1s;
    }
    .db.press .asv{transform:scale(.88) rotate(var(--rot,0deg));}
    .db.press .ap{
      fill:#5ad0ff;
      filter:drop-shadow(0 0 10px rgba(90,208,255,.95)) drop-shadow(1px 4px 6px rgba(0,0,50,.8));
    }

    /* ── FAB (list toggle) ── */
    #fab{
      position:fixed; bottom:14px; right:14px; z-index:200;
      width:46px; height:46px;
      background:var(--panel2); border:1px solid var(--border);
      border-radius:50%; display:flex; align-items:center; justify-content:center;
      font-size:22px; cursor:pointer; touch-action:manipulation;
      box-shadow:0 2px 12px rgba(0,0,0,.5);
      transition:border-color .15s, background .15s;
      color:var(--text);
    }
    #fab.active{border-color:var(--glow);color:var(--glow);background:rgba(0,200,240,.1);}
    #fab:active{transform:scale(.92);}

    /* ── LIST PANEL (slide in from right) ── */
    #list-panel{
      position:fixed; top:0; right:0; bottom:0;
      width:min(340px, 92vw);
      background:var(--panel);
      border-left:1px solid var(--border);
      display:flex; flex-direction:column;
      transform:translateX(100%);
      transition:transform .25s ease;
      z-index:500;
      box-shadow:-4px 0 20px rgba(0,0,0,.6);
    }
    #list-panel.open{transform:translateX(0);}
    #list-panel-hdr{
      display:flex; align-items:center; justify-content:space-between;
      padding:8px 12px; border-bottom:1px solid var(--border); flex-shrink:0;
    }
    #list-panel-title{font-size:9px;letter-spacing:3px;color:var(--text-dim);}
    #list-panel-count{font-size:9px;color:var(--glow);}
    #list-close{
      background:none; border:none; color:var(--text-dim);
      font-size:20px; cursor:pointer; padding:2px 6px;
      touch-action:manipulation; font-family:inherit;
    }
    #list-close:active{color:var(--danger);}
    #list-scroll{flex:1;overflow-y:auto;overflow-x:hidden;}
    #list-scroll::-webkit-scrollbar{width:3px;}
    #list-scroll::-webkit-scrollbar-track{background:var(--bg);}
    #list-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
    .si{
      display:flex; align-items:center; padding:7px 12px;
      border-bottom:1px solid #081422; cursor:pointer; gap:8px;
      transition:background .1s;
    }
    .si:active,.si:hover{background:var(--panel2);}
    .si.exact{background:#160800;}
    .si-img{width:22px;height:22px;object-fit:contain;flex-shrink:0;opacity:.85;}
    .si-code{font-size:10px;color:var(--glow);letter-spacing:1px;flex-shrink:0;
      width:104px;text-shadow:0 0 4px rgba(0,200,240,.3);}
    .si-code .mp{color:var(--success);}
    .si-name{flex:1;font-size:12px;color:var(--text-bright);
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .si-cat{font-size:7px;letter-spacing:1px;padding:2px 4px;border-radius:2px;flex-shrink:0;}

    /* Backdrop */
    #backdrop{
      position:fixed;inset:0;z-index:490;
      background:rgba(0,0,0,.4);
      opacity:0;pointer-events:none;transition:opacity .25s;
    }
    #backdrop.show{opacity:1;pointer-events:auto;}

    /* ── FLASH OVERLAY ── */
    #flash{
      position:fixed;inset:0;z-index:10000;
      background:rgba(2,5,9,.94);
      display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;
      opacity:0;pointer-events:none;transition:opacity .2s;
    }
    #flash.show{opacity:1;pointer-events:none;}/* tappable class enables interaction after delay */
    #flash.show.tappable{pointer-events:auto;}
    #flash-img-wrap{width:240px;height:240px;display:flex;align-items:center;justify-content:center;}
    #flash-img{width:240px;height:240px;object-fit:contain;display:none;}
    #flash-emoji{font-size:174px;}
    #flash-name{font-size:22px;font-weight:bold;letter-spacing:3px;
      text-align:center;padding:0 20px;text-shadow:0 0 20px var(--success2);}
    #flash-code{font-size:18px;color:var(--glow);letter-spacing:5px;text-shadow:0 0 12px var(--glow);}
    #flash-label{font-size:10px;letter-spacing:6px;color:var(--text-dim);}
    #red-flash{
      position:fixed;inset:0;z-index:9998;background:#c01828;
      opacity:0;pointer-events:none;transition:opacity .35s ease-out;
    }
    #flash-bar{
      position:absolute;bottom:0;left:0;height:4px;width:100%;
      background:var(--glow);box-shadow:0 0 10px var(--glow);
      transform-origin:left center;transform:scaleX(0);
    }
    #flash.show #flash-bar{animation:flash-shrink 4000ms linear forwards;}
    @keyframes flash-shrink{from{transform:scaleX(1);}to{transform:scaleX(0);}}

    /* fullscreen */
    :fullscreen #app,:-webkit-full-screen #app{width:100vw;height:100dvh;}

    /* ── HOME SCREEN ── */
    #home-screen{
      position:fixed;inset:0;z-index:1000;
      background:radial-gradient(ellipse at 50% 42%,#4ab8e8 0%,#1e72b8 28%,#0a3888 58%,#041028 100%);
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      cursor:pointer;transition:opacity .4s;
    }
    #home-screen.hidden{opacity:0;pointer-events:none;}
    #app.hidden{display:none;}

    /* corners */
    .hc{position:absolute;width:28px;height:28px;border-color:rgba(200,230,255,.65);border-style:solid;}
    .hc-tl{top:14px;left:14px;border-width:2px 0 0 2px;}
    .hc-tr{top:14px;right:14px;border-width:2px 2px 0 0;}
    .hc-bl{bottom:14px;left:14px;border-width:0 0 2px 2px;}
    .hc-br{bottom:14px;right:14px;border-width:0 2px 2px 0;}

    /* emblem */
    #home-emblem{display:flex;align-items:center;gap:14px;margin-bottom:16px;color:rgba(220,242,255,.88);width:min(440px,78vw);}
    .he-lines{display:flex;flex-direction:column;gap:5px;flex:1;}
    .he-line{height:2px;background:currentColor;border-radius:1px;}
    .he-line.s{height:1px;opacity:.55;}
    #home-skull{font-size:38px;line-height:1;flex-shrink:0;text-shadow:0 0 12px rgba(180,220,255,.8);}

    /* title */
    #home-title{
      font-family:'Arial Black',Arial,sans-serif;
      font-size:clamp(28px,7vw,56px);
      font-weight:900;font-style:italic;
      color:#ddeeff;
      text-shadow:0 0 28px rgba(120,200,255,.75),0 0 60px rgba(60,140,255,.4),2px 3px 8px rgba(0,0,80,.9);
      letter-spacing:4px;line-height:1.05;text-align:center;
      margin-bottom:26px;
    }

    /* progress */
    #home-prog-outer{display:flex;align-items:center;gap:10px;width:min(420px,76vw);}
    .hpa{color:rgba(200,230,255,.5);font-size:13px;flex-shrink:0;}
    #home-prog-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;}
    #home-pct{font-size:11px;letter-spacing:3px;color:rgba(200,230,255,.65);font-family:'Courier New',monospace;}
    #home-prog-bar{width:100%;height:14px;border:1px solid rgba(200,230,255,.35);background:rgba(0,30,90,.45);overflow:hidden;}
    #home-prog-fill{
      height:100%;width:0%;
      background:repeating-linear-gradient(90deg,
        rgba(220,242,255,.92) 0,rgba(220,242,255,.92) 9px,
        rgba(100,180,255,.12) 9px,rgba(100,180,255,.12) 13px);
    }

    /* prompt */
    #home-prompt{
      margin-top:20px;font-size:11px;letter-spacing:5px;
      color:rgba(200,230,255,.55);opacity:0;transition:opacity .5s;
      animation:hpulse 2s ease-in-out infinite;
    }
    @keyframes hpulse{0%,100%{opacity:.3}50%{opacity:.8}}

    /* home fab */
    #home-fab{
      position:fixed;bottom:14px;left:14px;z-index:1100;
      width:46px;height:46px;background:var(--panel2);border:1px solid var(--border);
      border-radius:50%;display:flex;align-items:center;justify-content:center;
      font-size:20px;cursor:pointer;touch-action:manipulation;
      box-shadow:0 2px 12px rgba(0,0,0,.5);color:var(--text);
      transition:border-color .15s,background .15s;
    }
    #home-fab:active{transform:scale(.92);}
    #fab.hidden{display:none;}
  </style>
</head>
<body>

<!-- RED RESET FLASH -->
<div id="red-flash"></div>

<!-- FLASH OVERLAY -->
<div id="flash">
  <div id="flash-img-wrap">
    <img id="flash-img" src="" alt="">
    <span id="flash-emoji">★</span>
  </div>
  <div id="flash-name">REINFORCE</div>
  <div id="flash-code">↑ ↓ → ← ↑</div>
  <div id="flash-label">STRATAGEM INBOUND</div>
  <div id="flash-bar"></div>
</div>

<!-- HOME SCREEN -->
<div id="home-screen">
  <div class="hc hc-tl"></div>
  <div class="hc hc-tr"></div>
  <div class="hc hc-bl"></div>
  <div class="hc hc-br"></div>

  <div id="home-emblem">
    <div class="he-lines">
      <div class="he-line"></div>
      <div class="he-line s"></div>
    </div>
    <div id="home-skull">☠</div>
    <div class="he-lines">
      <div class="he-line"></div>
      <div class="he-line s"></div>
    </div>
  </div>

  <div id="home-title">PERSONAL HELLPAD<br>SYSTEM</div>

  <div id="home-prog-outer">
    <span class="hpa">◄</span>
    <div id="home-prog-wrap">
      <div id="home-pct">0%</div>
      <div id="home-prog-bar">
        <div id="home-prog-fill"></div>
      </div>
    </div>
    <span class="hpa">►</span>
  </div>

  <div id="home-prompt">— TAP TO LAUNCH —</div>
</div>

<!-- BACKDROP -->
<div id="backdrop" onclick="closeList()"></div>

<!-- LIST PANEL -->
<div id="list-panel">
  <div id="list-panel-hdr">
    <span id="list-panel-title">STRATAGEM DATABASE</span>
    <span id="list-panel-count"></span>
    <button id="list-close" onclick="closeList()">✕</button>
  </div>
  <div id="list-scroll">
    <div id="stratagem-list"></div>
  </div>
</div>

<!-- APP (hidden until launched) -->
<div id="app" class="hidden">

  <!-- TOP STRIP: sequence + clear -->
  <div id="strip">
    <div id="strip-arrows">
      <span id="strip-empty">ENTER CODE...</span>
    </div>
    <span id="strip-status"></span>
    <button id="strip-clr" onclick="clr()">✕</button>
  </div>

  <!-- MAIN: d-pad -->
  <div id="main">
    <div id="dpad-bg">
      <div id="dpad-grid">
        <!-- Row 0: spacer · UP · spacer -->
        <div class="dpad-sp"></div>
        <button class="db" data-dir="U">
          <svg class="asv" viewBox="0 0 100 100">
            <polygon class="ap" points="50,4 96,52 68,52 68,96 32,96 32,52 4,52"/>
          </svg>
        </button>
        <div class="dpad-sp"></div>
        <!-- Row 1: LEFT · DOWN · RIGHT -->
        <button class="db" data-dir="L">
          <svg class="asv" viewBox="0 0 100 100" style="transform:rotate(-90deg)">
            <polygon class="ap" points="50,4 96,52 68,52 68,96 32,96 32,52 4,52"/>
          </svg>
        </button>
        <button class="db" data-dir="D">
          <svg class="asv" viewBox="0 0 100 100" style="transform:rotate(180deg)">
            <polygon class="ap" points="50,4 96,52 68,52 68,96 32,96 32,52 4,52"/>
          </svg>
        </button>
        <button class="db" data-dir="R">
          <svg class="asv" viewBox="0 0 100 100" style="transform:rotate(90deg)">
            <polygon class="ap" points="50,4 96,52 68,52 68,96 32,96 32,52 4,52"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

</div>

<!-- FAB: list toggle (hidden on home) -->
<button id="fab" class="hidden" onclick="toggleList()">≡</button>

<!-- HOME FAB: bottom-left nav -->
<button id="home-fab" onclick="toggleScreen()">▶</button>

function iconUrl(n){const p=ICONS[n];return p?CDN+p.split('/').map(encodeURIComponent).join('/'):null;}

const S=[
  {n:"Reinforce",          c:"Mission",  k:["U","D","R","L","U"]},
  {n:"Resupply",           c:"Mission",  k:["D","D","U","R"]},
  {n:"SOS Beacon",         c:"Mission",  k:["U","D","R","U"]},

const CAT_COLOR={
  Mission:"#f0a040",Orbital:"#9b5de5",Eagle:"#00bbf9",
  Support:"#4cc9f0",Backpack:"#3a86ff",Emplacement:"#8338ec",
  Mines:"#ff4488",Sentry:"#06d6a0",Exosuit:"#ff9f1c",
};
const CAT_ICON={
  Mission:"🎯",Orbital:"🛸",Eagle:"🦅",
  Support:"🔫",Backpack:"🎒",Emplacement:"🏗",
  Mines:"💣",Sentry:"🤖",Exosuit:"🦾",
};
const DEG={U:0,R:90,D:180,L:-90};
const SYM={U:"↑",D:"↓",L:"←",R:"→"};

let inp=[],resetTimer=null,ctx=null;

/* ── AUDIO ── */
function audio(){if(!ctx)ctx=new(window.AudioContext||window.webkitAudioContext)();return ctx;}
function beep(f=440,d=.08,t='square',v=.12){
  try{const a=audio(),o=a.createOscillator(),g=a.createGain();
    o.connect(g);g.connect(a.destination);o.type=t;o.frequency.value=f;
    g.gain.setValueAtTime(v,a.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,a.currentTime+d);
    o.start();o.stop(a.currentTime+d);}catch(e){}
}
function beepOK(){beep(523,.1,'square',.18);setTimeout(()=>beep(659,.1,'square',.18),100);setTimeout(()=>beep(784,.22,'square',.18),200);}
function beepErr(){beep(180,.18,'sawtooth',.1);}
function vibe(p){try{navigator.vibrate&&navigator.vibrate(p);}catch(e){}}

/* ── INPUT ── */
function flashRed(){
  const el=document.getElementById('red-flash');
  el.style.transition='none';el.style.opacity='.45';
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    el.style.transition='opacity .4s ease-out';el.style.opacity='0';
  }));
}
function addDir(d){
  if(resetTimer){clearTimeout(resetTimer);resetTimer=null;}
  inp=[...inp,d];
  const exact=getExact();
  if(exact){
    beepOK();vibe([60,40,60,40,120]);
    inp=[];  // clear immediately so next stratagem can be entered right away
    showFlash(exact);resetTimer=setTimeout(clr,4800);
  } else {
    if(getFiltered().length===0){beepErr();vibe([30,20,30]);flashRed();inp=[];}
    else{beep(400+inp.length*50,.06,'square');vibe(25);}
  }
  render();
}
function bksp(){if(inp.length){inp.pop();beep(300,.05,'square',.1);render();}}
function clr(){
  inp=[];if(resetTimer){clearTimeout(resetTimer);resetTimer=null;}
  document.getElementById('flash').classList.remove('show','tappable');render();
}
function getFiltered(){return S.filter(s=>{for(let i=0;i<inp.length;i++)if(s.k[i]!==inp[i])return false;return true;});}
function getExact(){return S.find(s=>s.k.length===inp.length&&s.k.every((d,i)=>d===inp[i]))||null;}

/* ── FLASH ── */
function showFlash(s){
  const url=iconUrl(s.n);
  const fi=document.getElementById('flash-img');
  const fe=document.getElementById('flash-emoji');
  if(url){fi.src=url;fi.style.display='block';fe.style.display='none';
    fi.onerror=()=>{fi.style.display='none';fe.style.display='inline';fe.textContent=CAT_ICON[s.c]||'★';};}
  else{fi.style.display='none';fe.style.display='inline';fe.textContent=CAT_ICON[s.c]||'★';}
  document.getElementById('flash-name').textContent=s.n.toUpperCase();
  document.getElementById('flash-name').style.color=CAT_COLOR[s.c]||'var(--success)';
  document.getElementById('flash-code').textContent=s.k.map(d=>SYM[d]).join(' ');
  const fl=document.getElementById('flash');
  fl.classList.remove('tappable');
  fl.classList.add('show');
  setTimeout(()=>fl.classList.add('tappable'),600);   // prevent accidental tap-through from d-pad press
  setTimeout(()=>fl.classList.remove('show','tappable'),4000);
}

/* ── ARROW SVG (for strip) ── */
function miniArrow(dir,size=28){
  return `<span class="strip-arrow"><svg width="${size}" height="${size}" viewBox="0 0 100 100" style="transform:rotate(${DEG[dir]}deg)"><polygon points="50,4 96,52 68,52 68,96 32,96 32,52 4,52" style="fill:var(--glow);filter:drop-shadow(0 1px 3px rgba(0,200,240,.4))"/></svg></span>`;
}

/* ── RENDER ── */
function render(){
  const fil=getFiltered();
  const exact=getExact();

  // Strip
  const arrows=document.getElementById('strip-arrows');
  const status=document.getElementById('strip-status');
  const empty=document.getElementById('strip-empty');
  if(inp.length===0){
    arrows.innerHTML='';
    if(empty)empty.style.display='';
    else arrows.insertAdjacentHTML('beforeend','<span id="strip-empty">ENTER CODE...</span>');
    status.textContent='';status.className='';
  } else {
    if(empty)empty.style.display='none';
    arrows.innerHTML=inp.map(d=>miniArrow(d)).join('');
    if(exact){
      status.textContent=exact.n.toUpperCase();
      status.className='hit';
    } else if(fil.length===0){
      status.textContent='⚠ INVALID';
      status.className='bad';
    } else {
      status.textContent=fil.length+' MATCH'+(fil.length!==1?'ES':'');
      status.className='';
    }
  }

  // List
  const show=inp.length===0?S:fil;
  document.getElementById('list-panel-count').textContent=show.length+' ENTRIES';
  document.getElementById('stratagem-list').innerHTML=show.map(s=>{
    const col=CAT_COLOR[s.c]||'#888';
    const isEx=s.k.length===inp.length&&s.k.every((d,i)=>d===inp[i]);
    const code=s.k.map((d,i)=>i<inp.length?`<span class="mp">${SYM[d]}</span>`:SYM[d]).join(' ');
    const url=iconUrl(s.n);
    const img=url?`<img class="si-img" src="${url}" alt="" onerror="this.style.display='none'">`:'';
    return `<div class="si${isEx?' exact':''}" onclick="preview('${s.n.replace(/\\/g,'\\\\').replace(/'/g,"\\'")}')">
      ${img}
      <div class="si-code">${code}</div>
      <div class="si-name">${s.n}</div>
      <div class="si-cat" style="color:${col};border:1px solid ${col}33;background:${col}18">${s.c.toUpperCase()}</div>
    </div>`;
  }).join('');
}

function preview(name){
  const s=S.find(x=>x.n===name);if(!s)return;
  if(resetTimer){clearTimeout(resetTimer);resetTimer=null;}
  inp=[...s.k];beepOK();showFlash(s);resetTimer=setTimeout(clr,3500);render();
  closeList();
}

/* ── LIST PANEL ── */
function toggleList(){
  const open=document.getElementById('list-panel').classList.toggle('open');
  document.getElementById('backdrop').classList.toggle('show',open);
  document.getElementById('fab').classList.toggle('active',open);
  render();
}
function closeList(){
  document.getElementById('list-panel').classList.remove('open');
  document.getElementById('backdrop').classList.remove('show');
  document.getElementById('fab').classList.remove('active');
}

/* ── D-PAD EVENTS ── */
document.querySelectorAll('.db[data-dir]').forEach(btn=>{
  btn.addEventListener('pointerdown',e=>{
    e.preventDefault();
    addDir(btn.dataset.dir);
    btn.classList.add('press');
    setTimeout(()=>btn.classList.remove('press'),150);
  });
});
document.getElementById('strip-clr').addEventListener('pointerdown',e=>{e.preventDefault();flashRed();clr();});

/* ── KEYBOARD ── */
document.addEventListener('keydown',e=>{
  const m={ArrowUp:'U',ArrowDown:'D',ArrowLeft:'L',ArrowRight:'R',w:'U',s:'D',a:'L',d:'R',W:'U',S:'D',A:'L',D:'R'};
  if(m[e.key]){
    e.preventDefault();addDir(m[e.key]);
    const b=document.querySelector(`.db[data-dir="${m[e.key]}"]`);
    if(b){b.classList.add('press');setTimeout(()=>b.classList.remove('press'),150);}
  } else if(e.key==='Backspace'){bksp();}
  else if(e.key==='Escape'||e.key==='Delete'){flashRed();clr();}
});

document.getElementById('flash').addEventListener('click',()=>{
  const fl=document.getElementById('flash');
  if(fl.classList.contains('tappable'))fl.classList.remove('show','tappable');
});

/* ── SCREEN NAV ── */
let onHome=true;
function showKeypad(){
  onHome=false;
  document.getElementById('home-screen').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  document.getElementById('fab').classList.remove('hidden');
  document.getElementById('home-fab').textContent='⌂';
  render();
}
function showHome(){
  onHome=true;
  closeList();
  document.getElementById('home-screen').classList.remove('hidden');
  document.getElementById('app').classList.add('hidden');
  document.getElementById('fab').classList.add('hidden');
  document.getElementById('home-fab').textContent='▶';
}
function toggleScreen(){onHome?showKeypad():showHome();}
document.getElementById('home-screen').addEventListener('click',showKeypad);

/* ── BOOT ANIMATION ── */
(function bootAnim(){
  const fill=document.getElementById('home-prog-fill');
  const pct=document.getElementById('home-pct');
  const prompt=document.getElementById('home-prompt');
  let n=0;
  const iv=setInterval(()=>{
    n=Math.min(100,n+Math.ceil(Math.random()*4+1));
    pct.textContent=n+'%';
    fill.style.width=n+'%';
    if(n>=100){clearInterval(iv);setTimeout(()=>{prompt.style.opacity='1';},400);}
  },28);
})();

render();
</script>
